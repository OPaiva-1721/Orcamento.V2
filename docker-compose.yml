services:
  db:
    image: postgres:16-alpine
    container_name: orcamento-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: orcamento
      POSTGRES_USER: orcamento
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orcamento -d orcamento"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: orcamento-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./apps/api/.env
    environment:
      DATABASE_URL: postgresql://orcamento:secret@db:5432/orcamento
      PORT: 3001
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: orcamento-web
    restart: unless-stopped
    ports:
      - "5173:80"
    env_file:
      - ./apps/web/.env

volumes:
  postgres_data:
    driver: local
