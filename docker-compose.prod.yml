services:
  db:
    image: postgres:16-alpine
    container_name: orcamento-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - orcamento-net

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: orcamento-api
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PORT: 3001
      NODE_ENV: production
    env_file:
      - ./apps/api/.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - orcamento-net

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: orcamento-web
    restart: always
    networks:
      - orcamento-net

  nginx:
    image: nginx:alpine
    container_name: orcamento-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_data:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - api
      - web
    networks:
      - orcamento-net

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_data:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    command: certonly --webroot --webroot-path=/var/www/certbot --email ${SSL_EMAIL} --agree-tos --no-eff-email -d ${DOMAIN}

volumes:
  postgres_data:
  certbot_data:
  certbot_certs:

networks:
  orcamento-net:
    driver: bridge
